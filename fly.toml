app = "beanstalk-api"
primary_region = "sjc"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  BEANSTALK_SERVER_PORT = "8080"
  # "demo" behaves like "test" (in-memory store, auth bypass, mock trade
  # fills) but additionally auto-seeds users, contests, and portfolios on
  # every server boot via src/server.js → scripts/seed-demo.js. Needed
  # because Fly auto-stops idle machines and the in-memory store doesn't
  # survive restarts. Adds ~3s to cold-start.
  BEANSTALK_ENVIRONMENT = "demo"
  BEANSTALK_SERVER_VERSION = "v1.0.0"
  BEANSTALK_GCP_BIGQUERY_DATASETID = "beanstalk_development"
  FIREBASE_PROJECT_ID = "beanstalk-vtrading"
